# =====================================================================
# THE ESG — Production Docker Compose
# Target: Single Hostinger KVM 4 VPS (16GB RAM, 4 vCPU, Ubuntu 24.04)
#
# Bring-up order (managed by ./scripts/deploy.sh):
#   1. postgres + redis + minio             (infrastructure)
#   2. minio-init                           (bucket bootstrap, one-shot)
#   3. api migrations                       (one-shot)
#   4. api + ai-engine + web + caddy        (application tier)
#
# Only Caddy is exposed to the public internet (80/443).
# All other services communicate over the internal `theesg` network.
# =====================================================================

name: theesg

networks:
  theesg:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddydata:
  caddyconfig:

services:
  # ----------------------------------------------------------------
  # PostgreSQL — primary OLTP store
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: theesg-postgres
    restart: unless-stopped
    shm_size: 256m
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: theesg
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=1000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d theesg"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - theesg

  # ----------------------------------------------------------------
  # Redis — cache + BullMQ queue backend
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: theesg-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - theesg

  # ----------------------------------------------------------------
  # MinIO — S3-compatible object store (evidence/reports/uploads)
  # ----------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: theesg-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://${DOMAIN}/minio
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - theesg

  # ----------------------------------------------------------------
  # MinIO bucket bootstrap (one-shot)
  # Creates buckets, sets versioning + object-lock for evidence.
  # ----------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: theesg-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      set -e;
      echo '>>> Configuring mc alias';
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";

      echo '>>> Creating theesg-evidence (versioned + object-lock for assurance)';
      mc mb --with-lock local/theesg-evidence || true;
      mc version enable local/theesg-evidence || true;
      mc retention set --default COMPLIANCE 365d local/theesg-evidence || true;

      echo '>>> Creating theesg-reports';
      mc mb local/theesg-reports || true;
      mc version enable local/theesg-reports || true;

      echo '>>> Creating theesg-uploads';
      mc mb local/theesg-uploads || true;

      echo '>>> Creating theesg-extracts';
      mc mb local/theesg-extracts || true;

      echo '>>> Creating theesg-backups';
      mc mb local/theesg-backups || true;
      mc version enable local/theesg-backups || true;

      echo '>>> Setting download policy on reports bucket';
      mc anonymous set download local/theesg-reports || true;

      echo '>>> Bucket setup complete';
      mc ls local;
      "
    networks:
      - theesg
    restart: "no"

  # ----------------------------------------------------------------
  # API — NestJS gateway (REST + GraphQL)
  # ----------------------------------------------------------------
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile.prod
    image: theesg/api:prod
    container_name: theesg-api
    restart: unless-stopped
    mem_limit: 2g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: info
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AI_ENGINE_URL: http://ai-engine:8100
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET_EVIDENCE: theesg-evidence
      S3_BUCKET_REPORTS: theesg-reports
      S3_BUCKET_UPLOADS: theesg-uploads
      S3_BUCKET_EXTRACTS: theesg-extracts
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      BACKEND_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    volumes:
      - ./data/uploads:/app/data/uploads
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - theesg

  # ----------------------------------------------------------------
  # AI Engine — Python FastAPI (OpenAI structured-output extraction)
  # ----------------------------------------------------------------
  ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile.prod
    image: theesg/ai-engine:prod
    container_name: theesg-ai-engine
    restart: unless-stopped
    mem_limit: 4g
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: 8100
      LOG_LEVEL: info
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: ${REDIS_URL}
      BACKEND_URL: http://api:4000
      BACKEND_CALLBACK_SECRET: ${BACKEND_CALLBACK_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET_EVIDENCE: theesg-evidence
      S3_BUCKET_EXTRACTS: theesg-extracts
    expose:
      - "8100"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - theesg

  # ----------------------------------------------------------------
  # Web — Next.js 15 frontend
  # ----------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api/v1/v1
        NEXT_PUBLIC_DEMO_MODE: "false"
    image: theesg/web:prod
    container_name: theesg-web
    restart: unless-stopped
    mem_limit: 1g
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api/v1/v1
      NEXTAUTH_URL: https://${DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_DEMO_MODE: "false"
      API_INTERNAL_URL: http://api:4000
      INTERNAL_API_URL: http://api:4000/api/v1/v1
    expose:
      - "3000"
    healthcheck:
      # Hit Next.js on localhost without following redirects. `/` returns 307
      # to /login for unauthenticated users; the container can't resolve the
      # public hostname in the redirect target, so wget's auto-redirect path
      # would fail. Node-based check accepts any <500 status as healthy.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get({host:'127.0.0.1',port:3000,path:'/',timeout:3000},r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - theesg

  # ----------------------------------------------------------------
  # Caddy — TLS termination + reverse proxy
  # ----------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: theesg-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - web
      - api
    networks:
      - theesg
