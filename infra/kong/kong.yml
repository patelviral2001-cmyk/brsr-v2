_format_version: "3.0"
_transform: true

# Declarative Kong config for the local stack. Mirrors the production
# Kong setup at a smaller scale - same routes, same plugins.

services:
  - name: api
    url: http://host.docker.internal:4000
    routes:
      - name: api-root
        paths: [/api]
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 600
          policy: local
      - name: cors
        config:
          origins: ["http://localhost:3000","http://localhost:3001"]
          methods: [GET,POST,PUT,PATCH,DELETE,OPTIONS]
          headers: [Accept,Authorization,Content-Type,Origin,X-Tenant-Hint,X-Idempotency-Key]
          credentials: true
          max_age: 3600
      - name: request-size-limiting
        config:
          allowed_payload_size: 200
      - name: prometheus
      - name: correlation-id
        config:
          header_name: X-Request-Id
          generator: uuid

  - name: ai-engine
    url: http://host.docker.internal:8001
    routes:
      - name: ai-engine-root
        paths: [/ai]
        strip_path: true
    plugins:
      - name: rate-limiting
        config: { minute: 60, policy: local }
      - name: prometheus
      - name: correlation-id
        config: { header_name: X-Request-Id }

  - name: copilot
    url: http://host.docker.internal:4200
    routes:
      - name: copilot-root
        paths: [/copilot]
        strip_path: true
    plugins:
      - name: rate-limiting
        config: { minute: 120, policy: local }
      - name: prometheus
      - name: correlation-id
        config: { header_name: X-Request-Id }

plugins:
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
