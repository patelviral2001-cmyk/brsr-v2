# =============================================================================
# BRSR AI Platform - "Production-feel" local stack.
#
# Full set of services that mirrors the production topology as closely as
# Docker Compose allows. Use this when:
#   - You are testing end-to-end flows that need Kong / observability.
#   - You want to demo to a stakeholder on a single laptop.
#   - You are reproducing a prod incident locally.
#
# For lightweight day-to-day dev, prefer docker-compose.dev.yml.
#
# Stack:
#   - postgres (16) with extensions: pgcrypto, ltree, pg_trgm, plus init scripts
#     that create the keycloak / langfuse databases.
#   - redis (7.4)
#   - qdrant (latest stable)
#   - opensearch (2.17) single-node, security disabled
#   - minio + auto-bucket bootstrap
#   - kafka (KRaft mode, single broker)
#   - keycloak (24) with realm import
#   - langfuse (latest)
#   - kong (3.8) as a database-less API gateway
#   - prometheus + grafana + loki + alertmanager for observability
#   - mailpit for outbound email capture (supplier magic links)
#
# All credentials are dev-only. NEVER expose this stack on a public network.
# =============================================================================

name: brsr

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ---------------------------------------------------------------------------
  # Postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: brsr-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: brsr
      POSTGRES_PASSWORD: brsr
      POSTGRES_DB: brsr_dev
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_connections=300
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=16MB
      - -c
      - log_min_duration_statement=200
    volumes:
      - brsr_pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brsr -d brsr_dev"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: brsr-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --notify-keyspace-events Ex
    volumes: ["brsr_redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # Qdrant (vectors)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: brsr-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    volumes: ["brsr_qdrant_data:/qdrant/storage"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # OpenSearch (lexical search + audit indexing)
  # ---------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: brsr-opensearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      DISABLE_SECURITY_PLUGIN: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "BrsrDev_Admin#2026"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes: ["brsr_opensearch_data:/usr/share/opensearch/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging: *default-logging
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # MinIO (S3) + bucket bootstrap
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: brsr-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: server /data --console-address ":9001"
    volumes: ["brsr_minio_data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks: [brsr]

  minio-init:
    image: minio/mc:latest
    container_name: brsr-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do
        echo 'waiting for minio...'; sleep 1;
      done;
      for bucket in brsr-dev brsr-evidence brsr-reports brsr-extracts brsr-backups; do
        mc mb --ignore-existing local/$$bucket;
      done;
      mc version enable local/brsr-evidence;
      mc version enable local/brsr-reports;
      mc retention set --default compliance 10y local/brsr-evidence || true;
      mc anonymous set download local/brsr-dev;
      echo 'minio bootstrap complete';
      "
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # Kafka (KRaft, single broker for dev)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: brsr-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: brsr-dev-kafka-cluster
    volumes: ["brsr_kafka_data:/var/lib/kafka/data"]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
    logging: *default-logging
    networks: [brsr]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: brsr-kafka-ui
    restart: unless-stopped
    ports: ["8082:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: brsr-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka: { condition: service_healthy }
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # Keycloak (OIDC)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: brsr-keycloak
    restart: unless-stopped
    ports: ["8080:8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: brsr
      KC_DB_PASSWORD: brsr
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
    logging: *default-logging
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # Langfuse (LLM observability)
  # ---------------------------------------------------------------------------
  langfuse:
    image: langfuse/langfuse:latest
    container_name: brsr-langfuse
    restart: unless-stopped
    ports: ["3100:3000"]
    environment:
      DATABASE_URL: postgresql://brsr:brsr@postgres:5432/langfuse
      NEXTAUTH_SECRET: brsr-dev-langfuse-secret-change-me
      SALT: brsr-dev-langfuse-salt-change-me
      NEXTAUTH_URL: http://localhost:3100
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    depends_on:
      postgres: { condition: service_healthy }
    logging: *default-logging
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # Kong - API gateway (DB-less mode; declarative config)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.8
    container_name: brsr-kong
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PLUGINS: bundled,prometheus
    volumes:
      - ./kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # Observability stack
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: brsr-prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - brsr_prom_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks: [brsr]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: brsr-alertmanager
    restart: unless-stopped
    ports: ["9093:9093"]
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    logging: *default-logging
    networks: [brsr]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: brsr-grafana
    restart: unless-stopped
    ports: ["3030:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - brsr_grafana_data:/var/lib/grafana
    depends_on:
      prometheus: { condition: service_healthy }
    logging: *default-logging
    networks: [brsr]

  loki:
    image: grafana/loki:3.3.0
    container_name: brsr-loki
    restart: unless-stopped
    ports: ["3110:3100"]
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - brsr_loki_data:/loki
    logging: *default-logging
    networks: [brsr]

  # ---------------------------------------------------------------------------
  # Mailpit (dev SMTP catcher)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: brsr-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    logging: *default-logging
    networks: [brsr]

networks:
  brsr:
    driver: bridge

volumes:
  brsr_pg_data:
  brsr_redis_data:
  brsr_qdrant_data:
  brsr_opensearch_data:
  brsr_minio_data:
  brsr_kafka_data:
  brsr_prom_data:
  brsr_grafana_data:
  brsr_loki_data:
