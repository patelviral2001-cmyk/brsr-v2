# Prometheus instance via the Prometheus Operator (kube-prometheus-stack
# is installed via Helm). This file scopes a custom Prometheus and the
# ServiceMonitors that select brsr workloads.
---
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: brsr
  namespace: observability
spec:
  replicas: 2
  retention: 30d
  retentionSize: 200GiB
  scrapeInterval: 30s
  evaluationInterval: 30s
  externalLabels:
    cluster: brsr-prod
    region: ap-south-1
  serviceAccountName: prometheus
  serviceMonitorSelector:
    matchLabels:
      monitoring: brsr
  podMonitorSelector:
    matchLabels:
      monitoring: brsr
  ruleSelector:
    matchLabels:
      monitoring: brsr
  alerting:
    alertmanagers:
      - namespace: observability
        name: alertmanager
        port: web
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: gp3
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 250Gi
  resources:
    requests: { cpu: 500m, memory: 4Gi }
    limits:   { cpu: 4,    memory: 12Gi }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: brsr-api
  namespace: observability
  labels:
    monitoring: brsr
spec:
  namespaceSelector:
    matchNames: [brsr-app]
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: service
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: brsr-ai-engine
  namespace: observability
  labels:
    monitoring: brsr
spec:
  namespaceSelector:
    matchNames: [brsr-ai]
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-engine
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
