# Grafana deployment via Helm overlay. Datasources are provisioned from
# infra/observability/grafana/datasources.yaml; dashboards are auto-loaded
# from a ConfigMap that ArgoCD syncs from infra/observability/grafana/dashboards/.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    grafana_datasource: '1'
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-operated.observability.svc:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.observability.svc:80
        jsonData:
          maxLines: 5000
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.observability.svc:3100
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            tags: [{ key: 'service.name', value: 'service' }]
      - name: ClickHouse
        type: grafana-clickhouse-datasource
        url: https://clickhouse.brsrai.com:8443
        jsonData:
          defaultDatabase: brsr_olap
          tlsSkipVerify: false
        secureJsonData:
          password: $__file{/etc/grafana/secrets/clickhouse-password}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: observability
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: brsr
        orgId: 1
        folder: BRSR
        type: file
        disableDeletion: true
        editable: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
