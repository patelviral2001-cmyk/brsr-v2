apiVersion: v1
kind: Service
metadata:
  name: {{ include "brsr-api.fullname" . }}
  labels: {{- include "brsr-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.ports.metrics }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector: {{- include "brsr-api.selectorLabels" . | nindent 4 }}
