image:
  repository: 111111111111.dkr.ecr.ap-south-1.amazonaws.com/brsr/api
  tag: ""           # set by ArgoCD app
  pullPolicy: IfNotPresent

replicaCount: 6

serviceAccount:
  create: true
  name: api
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::111111111111:role/brsr-prod-api

service:
  type: ClusterIP
  port: 80
  targetPort: 4000
  metricsPort: 9464

ports:
  app: 4000
  metrics: 9464

env:
  NODE_ENV: production
  LOG_LEVEL: info
  PORT: "4000"
  METRICS_PORT: "9464"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.observability.svc:4317
  OTEL_SERVICE_NAME: api
  REGION: ap-south-1

envFrom:
  - secretRef:
      name: api-runtime          # synced via ExternalSecret

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

probes:
  liveness:
    path: /healthz/live
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /healthz/ready
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  startup:
    path: /healthz/live
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Pods
      pods:
        metric:
          name: brsr_api_request_queue_depth
        target:
          type: AverageValue
          averageValue: "30"

pdb:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress
      ports:
        - port: 4000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              name: brsr-app
        - namespaceSelector:
            matchLabels:
              name: brsr-ai
      ports:
        - port: 4000
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: brsr-data
    - to: []         # Aurora, Redis, Anthropic, S3 (resolved via CoreDNS + NAT)
      ports:
        - port: 443
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 53
          protocol: UDP

podAnnotations:
  linkerd.io/inject: enabled
  config.linkerd.io/proxy-cpu-request: 100m
  config.linkerd.io/proxy-memory-request: 64Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

nodeSelector:
  role: app

tolerations: []

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: api

volumes:
  - name: tmp
    emptyDir:
      sizeLimit: 1Gi

volumeMounts:
  - name: tmp
    mountPath: /tmp
