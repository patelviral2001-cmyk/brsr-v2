# Loki Helm values overlay for our cluster (SimpleScalable mode).
# Backed by S3 for chunks + index; KMS-encrypted bucket.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-values
  namespace: observability
data:
  values.yaml: |
    deploymentMode: SimpleScalable
    loki:
      auth_enabled: false
      schemaConfig:
        configs:
          - from: "2026-01-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: index_
              period: 24h
      storage:
        type: s3
        bucketNames:
          chunks: brsr-prod-loki-chunks
          ruler: brsr-prod-loki-ruler
        s3:
          region: ap-south-1
      limits_config:
        retention_period: 30d
        max_query_parallelism: 32
        ingestion_rate_mb: 16
        ingestion_burst_size_mb: 32
      compactor:
        retention_enabled: true
        retention_delete_delay: 2h
    write:
      replicas: 3
      persistence:
        enabled: true
        size: 50Gi
        storageClass: gp3
    read:
      replicas: 3
    backend:
      replicas: 3
      persistence:
        enabled: true
        size: 20Gi
    gateway:
      replicas: 2
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::111111111111:role/brsr-prod-loki
