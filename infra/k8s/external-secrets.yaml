# External Secrets Operator: syncs AWS Secrets Manager + Vault into K8s.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameterstore
spec:
  provider:
    aws:
      service: ParameterStore
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# Example ExternalSecret: API pulls DB + Anthropic + JWT signer secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-runtime
  namespace: brsr-app
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: api-runtime
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: 'postgres://brsr_master:{{ .db_password }}@brsr-prod-aurora.cluster-xxx.ap-south-1.rds.amazonaws.com:5432/brsr?sslmode=require'
        ANTHROPIC_API_KEY: '{{ .anthropic }}'
        JWT_PRIVATE_KEY: '{{ .jwt_private }}'
        JWT_PUBLIC_KEY:  '{{ .jwt_public }}'
        REDIS_URL: 'rediss://default:{{ .redis_token }}@brsr-prod-redis.xxx.ng.0001.aps1.cache.amazonaws.com:6379/0'
  data:
    - secretKey: db_password
      remoteRef:
        key: brsr-prod/db/master
        property: password
    - secretKey: anthropic
      remoteRef:
        key: brsr-prod/anthropic/api-key
        property: api_key
    - secretKey: jwt_private
      remoteRef:
        key: brsr-prod/jwt/signer
        property: private_key
    - secretKey: jwt_public
      remoteRef:
        key: brsr-prod/jwt/signer
        property: public_key
    - secretKey: redis_token
      remoteRef:
        key: brsr-prod/redis/auth
        property: token
